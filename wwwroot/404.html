<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sprint Capacity Planner</title>
  <script>
    // GitHub Pages SPA routing workaround.
    // Stores the full URL in sessionStorage so the main index.html can redirect.
    var segmentCount = 1; // number of path segments in the repo name (e.g. 1 for /Sprintly/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting…</body>
</html>
